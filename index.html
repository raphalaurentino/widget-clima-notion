<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget de clima para Notion</title>
  <style>
    :root {
      --bg: #f8f6f5;
      --card: rgba(255, 255, 255, 0.88);
      --text: #3d3431;
      --muted: #77665c;
      --soft: #eee9e6;
      --accent: #998178;
      --accent-light: #c6b9b3;
      --border: rgba(119, 102, 92, 0.16);
      --shadow: 0 10px 28px rgba(61, 52, 49, 0.10);
    }

    [data-theme="dark"] {
      --bg: #26211f;
      --card: rgba(54, 47, 44, 0.94);
      --text: #f5efec;
      --muted: #c6b9b3;
      --soft: #443a36;
      --accent: #c6b9b3;
      --accent-light: #998178;
      --border: rgba(238, 233, 230, 0.13);
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] {
        --bg: #26211f;
        --card: rgba(54, 47, 44, 0.94);
        --text: #f5efec;
        --muted: #c6b9b3;
        --soft: #443a36;
        --accent: #c6b9b3;
        --accent-light: #998178;
        --border: rgba(238, 233, 230, 0.13);
        --shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      }
    }

    * { box-sizing: border-box; }

    /*
      Somente a página externa fica transparente.
      O cartão principal e os cartões internos mantêm o visual original.
    */
    html,
    body {
      margin: 0;
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
    }

    body {
      padding: 12px;
      min-height: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .widget {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .location {
      margin: 0;
      font-size: 17px;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    .updated {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .current {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
      padding: 14px;
      border-radius: 16px;
      background: var(--soft);
    }

    .current-main {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .current-icon {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 4px 6px rgba(61, 52, 49, 0.12));
    }

    .temperature {
      font-size: 42px;
      line-height: 1;
      font-weight: 780;
      letter-spacing: -0.07em;
    }

    .description {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(78px, 1fr));
      gap: 7px;
    }

    .metric {
      padding: 8px 9px;
      border-radius: 12px;
      background: var(--card);
      text-align: center;
    }

    .metric-label {
      color: var(--muted);
      font-size: 10px;
    }

    .metric-value {
      margin-top: 2px;
      font-size: 12px;
      font-weight: 750;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(5, minmax(92px, 1fr));
      gap: 8px;
    }

    .day {
      padding: 10px 7px;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
      background: rgba(255, 255, 255, 0.22);
    }

    .day-name {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .day-icon {
      margin: 6px 0 4px;
      font-size: 28px;
      line-height: 1;
    }

    .range {
      font-size: 12px;
      font-weight: 750;
    }

    .rain {
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
    }

    .footer {
      margin-top: 10px;
      color: var(--muted);
      font-size: 9px;
      text-align: right;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .loading, .error {
      min-height: 210px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 670px) {
      .current {
        grid-template-columns: 1fr;
      }

      .forecast {
        grid-template-columns: repeat(5, minmax(75px, 1fr));
        overflow-x: auto;
        padding-bottom: 3px;
      }

      .day {
        min-width: 78px;
      }
    }
  </style>
</head>
<body>
  <main class="widget" id="app">
    <div class="loading">Carregando previsão do tempo…</div>
  </main>

  <script>
    /*
      PERSONALIZAÇÃO POR URL:
      ?cidade=Buenos%20Aires&pais=AR&dias=5&tema=auto

      Parâmetros:
      - cidade: nome da cidade
      - pais: código ISO de duas letras, como BR ou AR
      - dias: de 3 a 7
      - tema: auto, light ou dark
    */

    const parametros = new URLSearchParams(window.location.search);

    const config = {
      cidade: parametros.get("cidade") || "Buenos Aires",
      pais: parametros.get("pais") || "",
      dias: Math.min(7, Math.max(3, Number(parametros.get("dias")) || 5)),
      tema: ["auto", "light", "dark"].includes(parametros.get("tema"))
        ? parametros.get("tema")
        : "auto"
    };

    document.documentElement.dataset.theme = config.tema;

    const app = document.getElementById("app");

    const clima = {
      0:  ["☀️", "Céu limpo"],
      1:  ["🌤️", "Predominantemente limpo"],
      2:  ["⛅", "Parcialmente nublado"],
      3:  ["☁️", "Nublado"],
      45: ["🌫️", "Neblina"],
      48: ["🌫️", "Neblina com geada"],
      51: ["🌦️", "Garoa leve"],
      53: ["🌦️", "Garoa moderada"],
      55: ["🌧️", "Garoa intensa"],
      56: ["🌧️", "Garoa congelante leve"],
      57: ["🌧️", "Garoa congelante intensa"],
      61: ["🌦️", "Chuva leve"],
      63: ["🌧️", "Chuva moderada"],
      65: ["🌧️", "Chuva forte"],
      66: ["🌧️", "Chuva congelante leve"],
      67: ["🌧️", "Chuva congelante forte"],
      71: ["🌨️", "Neve leve"],
      73: ["🌨️", "Neve moderada"],
      75: ["❄️", "Neve forte"],
      77: ["❄️", "Grãos de neve"],
      80: ["🌦️", "Pancadas leves"],
      81: ["🌧️", "Pancadas moderadas"],
      82: ["⛈️", "Pancadas fortes"],
      85: ["🌨️", "Pancadas de neve leves"],
      86: ["❄️", "Pancadas de neve fortes"],
      95: ["⛈️", "Trovoadas"],
      96: ["⛈️", "Trovoadas com granizo leve"],
      99: ["⛈️", "Trovoadas com granizo forte"]
    };

    const obterClima = (codigo) => clima[codigo] || ["🌡️", "Condição variável"];

    const diaSemana = (dataISO, indice) => {
      if (indice === 0) return "Hoje";
      return new Intl.DateTimeFormat("pt-BR", { weekday: "short" })
        .format(new Date(`${dataISO}T12:00:00`))
        .replace(".", "");
    };

    const arredondar = (valor) => Math.round(Number(valor));

    async function obterLocal() {
      const filtroPais = config.pais
        ? `&countryCode=${encodeURIComponent(config.pais)}`
        : "";

      const url =
        `https://geocoding-api.open-meteo.com/v1/search` +
        `?name=${encodeURIComponent(config.cidade)}` +
        `&count=1&language=pt&format=json${filtroPais}`;

      const resposta = await fetch(url);
      if (!resposta.ok) throw new Error("Não foi possível localizar a cidade.");

      const dados = await resposta.json();
      if (!dados.results?.length) {
        throw new Error("Cidade não encontrada. Confira o nome e o código do país.");
      }

      return dados.results[0];
    }

    async function obterPrevisao(local) {
      const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${local.latitude}` +
        `&longitude=${local.longitude}` +
        `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
        `&timezone=auto` +
        `&forecast_days=${config.dias}`;

      const resposta = await fetch(url);
      if (!resposta.ok) throw new Error("Não foi possível consultar a previsão.");

      return resposta.json();
    }

    function renderizar(local, previsao) {
      const atual = previsao.current;
      const diario = previsao.daily;
      const [iconeAtual, descricaoAtual] = obterClima(atual.weather_code);

      const localDetalhado = [
        local.name,
        local.admin1,
        local.country_code
      ].filter(Boolean).join(" · ");

      const atualizadoEm = new Intl.DateTimeFormat("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date());

      const dias = diario.time.map((data, i) => {
        const [icone] = obterClima(diario.weather_code[i]);
        const chuva = diario.precipitation_probability_max?.[i];

        return `
          <article class="day">
            <div class="day-name">${diaSemana(data, i)}</div>
            <div class="day-icon">${icone}</div>
            <div class="range">
              ${arredondar(diario.temperature_2m_max[i])}° /
              ${arredondar(diario.temperature_2m_min[i])}°
            </div>
            <div class="rain">💧 ${chuva ?? 0}%</div>
          </article>
        `;
      }).join("");

      app.innerHTML = `
        <header class="header">
          <div>
            <h1 class="location">${localDetalhado}</h1>
            <div class="updated">Atualizado em ${atualizadoEm}</div>
          </div>
        </header>

        <section class="current">
          <div class="current-main">
            <div class="current-icon">${iconeAtual}</div>
            <div>
              <div class="temperature">${arredondar(atual.temperature_2m)}°</div>
              <div class="description">${descricaoAtual}</div>
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <div class="metric-label">Sensação</div>
              <div class="metric-value">${arredondar(atual.apparent_temperature)}°</div>
            </div>
            <div class="metric">
              <div class="metric-label">Umidade</div>
              <div class="metric-value">${arredondar(atual.relative_humidity_2m)}%</div>
            </div>
            <div class="metric">
              <div class="metric-label">Vento</div>
              <div class="metric-value">${arredondar(atual.wind_speed_10m)} km/h</div>
            </div>
          </div>
        </section>

        <section class="forecast">${dias}</section>

        <footer class="footer">
          Dados meteorológicos:
          <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a>
          · Localização:
          <a href="https://www.geonames.org/" target="_blank" rel="noopener noreferrer">GeoNames</a>
        </footer>
      `;
    }

    async function iniciar() {
      try {
        const local = await obterLocal();
        const previsao = await obterPrevisao(local);
        renderizar(local, previsao);
      } catch (erro) {
        app.innerHTML = `<div class="error">⚠️ ${erro.message}</div>`;
      }
    }

    iniciar();
  </script>
</body>
</html>
